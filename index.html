<script>
  const $ = (id) => document.getElementById(id);

  const fields = {
    initialInvestment: $("initialInvestment"),
    annualOpex: $("annualOpex"),
    dryDockCost: $("dryDockCost"),
    annualOverhead: $("annualOverhead"),
    residualValue: $("residualValue"),
    investmentTerm: $("investmentTerm"),
    opexEscalator: $("opexEscalator"),
    dryDockEscalator: $("dryDockEscalator"),
    overheadEscalator: $("overheadEscalator"),
    targetIRR: $("targetIRR")
  };

  function num(el) {
    return Number(el.value || 0);
  }

  function currency(x) {
    return new Intl.NumberFormat("en-US", {
      style: "currency",
      currency: "USD",
      maximumFractionDigits: 0
    }).format(x);
  }

  function currency2(x) {
    return new Intl.NumberFormat("en-US", {
      style: "currency",
      currency: "USD",
      minimumFractionDigits: 2,
      maximumFractionDigits: 2
    }).format(x);
  }

  function pct(x) {
    return (x * 100).toFixed(2) + "%";
  }

  function npvAtRate(rate, cashFlows) {
    let total = 0;
    for (let t = 0; t < cashFlows.length; t++) {
      total += cashFlows[t] / Math.pow(1 + rate, t);
    }
    return total;
  }

  function buildRows(input, annualRevenue) {
    const rows = [];
    for (let year = 1; year <= input.investmentTerm; year++) {
      const opex = input.annualOpex * Math.pow(1 + input.opexEscalator, year - 1);
      const overhead = input.annualOverhead * Math.pow(1 + input.overheadEscalator, year - 1);
      const dryDock =
        year % 5 === 0
          ? input.dryDockCost * Math.pow(1 + input.dryDockEscalator, year - 1)
          : 0;

      let netCashFlow = annualRevenue - opex - overhead - dryDock;
      if (year === input.investmentTerm) {
        netCashFlow += input.residualValue;
      }

      rows.push({
        year,
        revenue: annualRevenue,
        opex,
        overhead,
        dryDock,
        netCashFlow
      });
    }
    return rows;
  }

  function solveAnnualRevenue(input) {
    const rate = input.targetIRR;
    let pvCosts = input.initialInvestment;
    let pvRevenueFactor = 0;

    for (let year = 1; year <= input.investmentTerm; year++) {
      const discount = Math.pow(1 + rate, year);

      const opex = input.annualOpex * Math.pow(1 + input.opexEscalator, year - 1);
      const overhead = input.annualOverhead * Math.pow(1 + input.overheadEscalator, year - 1);
      const dryDock =
        year % 5 === 0
          ? input.dryDockCost * Math.pow(1 + input.dryDockEscalator, year - 1)
          : 0;

      pvCosts += (opex + overhead + dryDock) / discount;
      pvRevenueFactor += 1 / discount;
    }

    pvCosts -= input.residualValue / Math.pow(1 + rate, input.investmentTerm);

    if (pvRevenueFactor <= 0) return null;
    return pvCosts / pvRevenueFactor;
  }

  function renderSchedule(rows) {
    const body = $("scheduleBody");
    body.innerHTML = "";

    for (const row of rows) {
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>${row.year}</td>
        <td>${currency(Math.round(row.revenue))}</td>
        <td>${currency(Math.round(row.opex))}</td>
        <td>${currency(Math.round(row.overhead))}</td>
        <td>${currency(Math.round(row.dryDock))}</td>
        <td>${currency(Math.round(row.netCashFlow))}</td>
      `;
      body.appendChild(tr);
    }
  }

  function calculate() {
    const input = {
      initialInvestment: num(fields.initialInvestment),
      annualOpex: num(fields.annualOpex),
      dryDockCost: num(fields.dryDockCost),
      annualOverhead: num(fields.annualOverhead),
      residualValue: num(fields.residualValue),
      investmentTerm: Math.floor(num(fields.investmentTerm)),
      opexEscalator: num(fields.opexEscalator) / 100,
      dryDockEscalator: num(fields.dryDockEscalator) / 100,
      overheadEscalator: num(fields.overheadEscalator) / 100,
      targetIRR: num(fields.targetIRR) / 100
    };

    if (input.initialInvestment <= 0 || input.investmentTerm <= 0 || input.targetIRR <= -1) {
      $("statusPill").textContent = "Please enter valid inputs";
      return;
    }

    const annualRevenue = solveAnnualRevenue(input);
    if (!isFinite(annualRevenue) || annualRevenue < 0) {
      $("statusPill").textContent = "Could not solve for revenue";
      return;
    }

    const dailyRevenue = annualRevenue / 365;
    const rows = buildRows(input, annualRevenue);

    const year1OpCash = rows[0].revenue - rows[0].opex - rows[0].overhead;
    const year1Yield = year1OpCash / input.initialInvestment;

    const operatingCashFlows = rows.map(r => r.revenue - r.opex - r.overhead);
    const avgYield =
      operatingCashFlows.reduce((a, b) => a + b, 0) /
      operatingCashFlows.length /
      input.initialInvestment;

    $("statusPill").textContent = "Calculation complete";
    $("dailyRevenue").textContent = currency2(dailyRevenue);
    $("annualRevenue").textContent = currency(Math.round(annualRevenue));
    $("year1Yield").textContent = pct(year1Yield);
    $("avgYield").textContent = pct(avgYield);

    renderSchedule(rows);
  }

  $("calculateBtn").addEventListener("click", calculate);

  $("adjustBtn").addEventListener("click", () => {
    const next = prompt("Enter new target IRR (%)", fields.targetIRR.value || "15");
    if (next === null) return;
    fields.targetIRR.value = next;
    calculate();
  });

  window.addEventListener("load", calculate);
</script>
